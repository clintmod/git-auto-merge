version: '3'

# shell env overrides these (Make's ?= semantics)
env:
  GIT_AUTO_MERGE_REPO: https://github.com/clintmod/git_auto_merge_test.git
  GIT_AUTO_MERGE_REPO_CONFLICT: https://github.com/clintmod/git_auto_merge_test_conflict.git
  IMAGE_NAME: clintmod/git-auto-merge

vars:
  BIN: .venv/bin/git-auto-merge
  VERSION:
    sh: yq .project.version pyproject.toml
  PYTHON_VERSION:
    sh: cat .python-version

tasks:
  default:
    silent: true
    cmds:
      - rite -l

  all:
    desc: Every check plus the integration tests
    aliases: [a]
    cmds:
      - task: format
      - task: build
      - task: test:unit
      - task: lint
      - task: flake8
      - task: bandit
      - task: typecheck
      - task: deptry
      - task: audit
      - task: lint:workflows
      - task: lint:docker
      - task: test:integration

  dev:
    desc: Everything in all except the integration tests
    aliases: [d]
    cmds:
      - task: format
      - task: build
      - task: test:unit
      - task: lint
      - task: flake8
      - task: bandit
      - task: typecheck
      - task: deptry
      - task: audit

  ci:
    desc: The checks CI runs (no integration tests — they push to external repos)
    cmds:
      - task: format:check
      - task: build
      - task: test:unit
      - task: lint
      - task: flake8
      - task: bandit
      - task: typecheck
      - task: deptry
      - task: audit
      - task: lint:workflows

  reports:
    internal: true
    silent: true
    cmds:
      - mkdir -p reports
    status:
      - test -d reports

  build:
    desc: Install dependencies into .venv
    aliases: [b]
    sources:
      - pyproject.toml
      - uv.lock
    generates:
      - ${BIN}
    cmds:
      - uv sync

  format:
    desc: Reformat with black and isort
    aliases: [f]
    deps: [build, reports]
    cmds:
      - set -o pipefail; uv run black . && uv run isort . | tee -i reports/format.ansi

  format:check:
    desc: Fail if black or isort would change anything (CI gate)
    aliases: [fc]
    deps: [build]
    cmds:
      - uv run black --check .
      - uv run isort --check-only .

  test:
    desc: Unit and integration tests
    aliases: [t]
    cmds:
      - task: test:unit
      - task: test:integration

  test:unit:
    desc: Unit tests with coverage (fails under 85%)
    aliases: [tu]
    deps: [build, reports]
    cmds:
      - |
        set -o pipefail
        unbuffer uv run pytest -vvv \
          --tb=long \
          --cov=src \
          --cov-report term-missing:skip-covered \
          --cov-fail-under=85 \
          $EXTRA_TEST_ARGS \
        tests/unit \
        | tee -i reports/test-unit.ansi

  test:unit:update:
    desc: Re-run unit tests updating pytest snapshots
    cmds:
      - EXTRA_TEST_ARGS="--snapshot-update" rite -f test:unit

  test:integration:
    desc: Integration tests (clones and pushes to GIT_AUTO_MERGE_REPO)
    aliases: [ti]
    deps: [build, reports]
    cmds:
      - |
        set -o pipefail
        unbuffer uv run pytest -vvv \
          --tb=long \
          $EXTRA_TEST_ARGS \
        tests/integration \
        | tee -i reports/test-integration.ansi

  lint:
    desc: Run pylint
    aliases: [l]
    deps: [build, reports]
    cmds:
      - set -o pipefail; uv run pylint -j4 -f colorized src tests | tee -i reports/lint.ansi

  flake8:
    desc: Run flake8 (config in .flake8)
    aliases: [f8]
    deps: [build, reports]
    cmds:
      - set -o pipefail; uv run flake8 src tests | tee -i reports/flake8.ansi

  bandit:
    desc: Run bandit security checks on src (config in pyproject.toml)
    deps: [build, reports]
    cmds:
      - set -o pipefail; uv run bandit -q -c pyproject.toml -r src | tee -i reports/bandit.ansi

  typecheck:
    desc: Run pyright
    aliases: [tc]
    deps: [build, reports]
    cmds:
      - set -o pipefail; uv run pyright src tests | tee -i reports/typecheck.ansi

  deptry:
    desc: Check for unused/missing/misplaced dependencies
    deps: [build, reports]
    cmds:
      - set -o pipefail; uv run deptry src | tee -i reports/deptry.ansi

  audit:
    desc: Audit dependencies for known vulnerabilities (replaces safety)
    deps: [build, reports]
    cmds:
      - set -o pipefail; uv run pip-audit --skip-editable | tee -i reports/audit.ansi

  lint:workflows:
    desc: Lint GitHub Actions workflows (actionlint + zizmor)
    deps: [build, reports]
    cmds:
      - actionlint
      - set -o pipefail; uv run zizmor .github/workflows/ | tee -i reports/zizmor.ansi

  lint:docker:
    desc: Lint the Dockerfile with hadolint
    deps: [reports]
    cmds:
      - set -o pipefail; hadolint Dockerfile | tee -i reports/hadolint.ansi

  dry-run:
    desc: Run the merge against GIT_AUTO_MERGE_REPO without pushing
    deps: [build]
    cmds:
      - uv run ${BIN} --dry-run

  run:
    desc: Run the merge against GIT_AUTO_MERGE_REPO
    deps: [build]
    cmds:
      - uv run ${BIN} $EXTRA_RUN_ARGS

  run:conflict:
    desc: Run the merge against the conflict test repo
    deps: [build]
    cmds:
      - uv run ${BIN} --repo $GIT_AUTO_MERGE_REPO_CONFLICT $EXTRA_RUN_ARGS

  clean:reports:
    desc: Remove generated reports
    cmds:
      - rm -rf reports/*

  tag:
    desc: Tag HEAD with the version from pyproject.toml
    cmds:
      - git tag v${VERSION}

  git:push:
    desc: Push commits and tags
    cmds:
      - git push --tags
      - git push

  release:
    desc: Full release — checks, docker image, tag, and push
    cmds:
      - task: all
      - task: docker:build
      - task: docker:test
      - task: docker:scan
      - task: docker:push
      - task: tag
      - task: git:push

  docker:
    desc: Build, test, scan, and push the docker image
    cmds:
      - task: docker:build
      - task: docker:test
      - task: docker:scan
      - task: docker:push

  docker:build:
    desc: Build the docker image
    aliases: [db]
    cmds:
      - docker build --build-arg PYTHON_VERSION=${PYTHON_VERSION} -t ${IMAGE_NAME}:${VERSION} .

  docker:build:builder:
    desc: Build only the builder stage of the docker image
    cmds:
      - docker build --target=builder --build-arg PYTHON_VERSION=${PYTHON_VERSION} -t ${IMAGE_NAME}:builder .

  docker:test:
    desc: Dry-run the image against the test repo
    cmds:
      - |
        docker run \
          -it --rm \
          -e GIT_AUTO_MERGE_REPO=https://github.com/clintmod/git_auto_merge_test.git \
          -e DEBUG=1 \
          -v $HOME/.ssh:/home/app/.ssh \
        ${IMAGE_NAME}:${VERSION} \
          --dry-run

  docker:scan:
    desc: Scan the image for CRITICAL vulnerabilities with trivy
    cmds:
      - |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "$HOME/trivy/.cache:/root/.cache/" \
          -v "$PWD/.trivyignore:/.trivyignore" \
        aquasec/trivy:latest \
          image \
            --timeout 20m \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --ignorefile /.trivyignore \
          "${IMAGE_NAME}:${VERSION}"

  docker:push:
    desc: Push the versioned and latest image tags
    cmds:
      - docker push ${IMAGE_NAME}:${VERSION}
      - docker tag ${IMAGE_NAME}:${VERSION} ${IMAGE_NAME}:latest
      - docker push ${IMAGE_NAME}:latest

  docker:shell:
    desc: Open a bash shell in the image
    cmds:
      - |
        docker run \
          -it --rm --entrypoint= \
          -e GIT_AUTO_MERGE_REPO=$GIT_AUTO_MERGE_REPO \
          -e DEBUG=1 \
          -v $HOME/.ssh:/home/app/.ssh \
        ${IMAGE_NAME}:${VERSION} \
        bash

  docker:run:
    desc: Run the image against GIT_AUTO_MERGE_REPO
    cmds:
      - |
        docker run \
          -it --rm \
          -e GIT_AUTO_MERGE_REPO=$GIT_AUTO_MERGE_REPO \
          -e DEBUG=1 \
          -v $HOME/.ssh:/home/app/.ssh \
        ${IMAGE_NAME}:${VERSION}

  print-env:
    desc: Print the environment rite runs tasks with
    cmds:
      - env | sort

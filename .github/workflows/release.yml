name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # cache disabled: this workflow publishes artifacts, and restoring a
      # cache into a publish job is a cache-poisoning vector (zizmor)
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false

      - name: Verify tag matches pyproject version
        run: |
          expected="v$(yq .project.version pyproject.toml)"
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pyproject version $expected"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: rite docker:build

      - name: Smoke test image
        run: rite docker:smoke

      - name: Scan image
        run: rite docker:scan

      - name: Push image
        run: rite docker:push

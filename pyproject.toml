[tool.poetry]
name = "git-auto-merge"
version = "1.3.10"
description = ""
authors = ["Clint M <cmodien@gmail.com>"]
readme = "README.md"

[tool.black]
line_length = 100

[tool.isort]
profile = "black"

[tool.bandit]
# B101: asserts are used as internal guards, not security controls; the CLI
#       is never run with python -O
# B404: shelling out is this tool's purpose
skips = ["B101", "B404"]

[tool.poetry.dependencies]
click = "^8.1.6"
jsonpickle = "^3.0.1"
loguru = "^0.7.0"
packaging = "^21"
python = "^3.11"

[tool.poetry.group.dev.dependencies]
black = "*"
isort = "*"
pylint = "*"
pyright = "^1.1.313"
pytest = "*"
pytest-cov = "*"
pytest-mock = "*"
pytest-snapshot = "^0.9.0"
safety = "*"
flake8 = "^7.3.0"
bandit = "^1.9.4"

[tool.poetry.scripts]
git-auto-merge = "git_auto_merge:cli"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
